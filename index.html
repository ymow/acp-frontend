    <!-- Structured data — FAQPage for AI answer engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Agent Covenant Protocol (ACP)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ACP is a self-hosted Go server that records every contribution from humans and AI agents in a SHA-256 append-only hash chain. A public formula calculates each contributor's ink token share. When revenue exists, the owner distributes by that share. No blockchain, no wallet, no central platform."
          }
        },
        {
          "@type": "Question",
          "name": "Is ACP a blockchain or DApp?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. ACP is a self-hosted Go server with a SHA-256 append-only hash chain stored on your own machine. No Ethereum, no Solana, no crypto wallet required. On-chain anchoring is a Phase 7 roadmap item — not the current implementation."
          }
        },
        {
          "@type": "Question",
          "name": "What are ink tokens? Can I trade or transfer them?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ink is a contribution unit, not a cryptocurrency. It is non-transferable, non-tradeable, and scoped to a single Covenant. It cannot be sent to a wallet. Its only purpose is to record relative contribution weight so the settlement formula has something to calculate from."
          }
        },
        {
          "@type": "Question",
          "name": "Who is the owner in ACP?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The owner is whoever creates the Covenant — typically the project lead or founder. They approve participants (approve_agent), approve contribution drafts (approve_draft), and initiate settlement (generate_settlement_output + confirm_settlement_output). They also decide when and how to distribute revenue using settled ink percentages as the distribution key."
          }
        },
        {
          "@type": "Question",
          "name": "What is a passage in ACP?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A passage is any unit of work submitted via propose_passage(). It can be a feature, a commit batch, a code review, a document, or any deliverable covered by the Covenant's tiers. The owner assigns a unit_count and the formula calculates tokens from that."
          }
        },
        {
          "@type": "Question",
          "name": "Does ACP settlement move money automatically?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Settlement generates a verified, tamper-evident record — nothing more. The owner calls generate_settlement_output() then confirm_settlement_output() to lock ink totals. Any financial distribution is a separate, owner-initiated action in any currency. Automated on-chain escrow is a Phase 7 roadmap item."
          }
        },
        {
          "@type": "Question",
          "name": "Is ACP live or a prototype?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ACP is live. Phase 1 and Phase 2 are complete. The first real Covenant was settled on 2026-04-15. The acp-server repository is MIT licensed and publicly available. You can run it today with a single binary and zero external dependencies."
          }
        }
      ]
    }
    </script>
